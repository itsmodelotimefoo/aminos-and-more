name: Template CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: arc-runners-frontend
    name: Validate template
    # The app project lives in app/ (ci/ holds the deploy config, AGENTS.md +
    # skills/ stay at root). Every build step runs there.
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # Deploys always ship the design inspector: apps-ci / apps-ci-dev export
      # HF_DESIGN_INSPECTOR=1 before `bun run build`. Validate that exact
      # artifact here — one build, not a separate plain + design pair.
      - name: Build (design inspector on, as deploys ship it)
        env:
          HF_DESIGN_INSPECTOR: "1"
        run: bun run build

      - name: Package tests
        run: bun run test:packages
